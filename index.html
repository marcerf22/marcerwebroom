<!DOCTYPE html>
<html>

<head>
    <title>marcerwebroom</title>
    <style>
        body {
            font-family: monospace;
            background-color: #2f2f2f;
            color: #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        #header {
            position: fixed;
            top: 0;
            display: flex;
            gap: 4px;
            color: #fff;
            cursor: pointer;
            transition: 250ms;
        }

        #header:hover {
            opacity: 0.75;
        }

        .opacity-hover {
            opacity: 1;
            transition: 250ms;
        }

        .opacity-hover:hover {
            opacity: 0.75;
        }

        .use-pinboard {
            background: #fff;
            color: #000;
            padding: 12px 20px;
            text-decoration: none;
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 5px;
            transition: 250ms;
        }

        .use-pinboard:hover {
            opacity: 0.5;
        }

        .use-old-site {
            background: #505050;
            color: #ccc;
            padding: 12px 20px;
            text-decoration: none;
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 5px;
            transition: 250ms;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .use-old-site::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: rgba(0, 0, 0, 0.25);
        }

        .use-old-site.holding::after {
            width: 100%;
            transition: width 2s linear;
        }

        .tool-box {
            position: fixed;
            bottom: 0;
            padding-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translateY(100%);
            transition: transform 400ms ease;
            z-index: 20;
        }

        .tool-box.visible {
            transform: translateY(0);
        }

        #bottom-trigger {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            z-index: 10;
        }

        .tool {
            background: rgba(204, 204, 204, 0.1);
            color: #ccc;
            text-decoration: none;
            padding: 12px;
            transition: 250ms;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool:hover {
            opacity: 0.5;
        }

        .tool-offline {
            background: rgba(204, 204, 204, 0.1);
            color: #ccc;
            text-decoration: none;
            padding: 12px;
            transition: 250ms;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>

<body>


    <div id="header">
        <h1 onclick="window.location.href='index.html'">marcerwebroom</h1>
        <p >v1.0</p>
    </div>

    <h1 style="color: #fff;">marcerwebroom is shutting down at 31.12.2026</h1>
    <p>We will migrate to our new project: <a href="pinboard.html" style="color: #ccc;">pinboard</a></p>

    <div style="display: flex; gap: 12px; margin-top: 25px;">
        <a href="pinboard.html" class="use-pinboard">Use pinboard</a>
        <a id="oldSiteBtn" class="use-old-site">Use the old site</a>
    </div>

    <div class="tool-box">
        <p>Or just use our tools</p>

                AudiomackRip

        </div>
    </div>

    <script>
        const btn = document.getElementById('oldSiteBtn');
        let timer = null;
        btn.addEventListener('mousedown', () => {
            btn.classList.add('holding');
            timer = setTimeout(() => {
                window.location.href = 'old-site.html';
            }, 2000);
        });
        ['mouseup', 'mouseleave'].forEach(e => btn.addEventListener(e, () => {
            btn.classList.remove('holding');
            clearTimeout(timer);
        }));
    </script>

    <script>
        const toolBox = document.querySelector('.tool-box');

        document.addEventListener('mousemove', (e) => {
            const fromBottom = window.innerHeight - e.clientY;
            if (fromBottom <= 150) {
                toolBox.classList.add('visible');
            } else if (!toolBox.matches(':hover')) {
                toolBox.classList.remove('visible');
            }
        });
    </script>
</body>
