<!DOCTYPE html>
<html>

<head>
    <title>marcerwebroom</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        body {
            font-family: Inter;
            background-color: #2f2f2f;
            color: #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100vw;
            margin: 0;
            user-select: none;
        }

        footer {
            margin-top: 48px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        button {
            padding: 12px;
            background: none;
            border: none;
            color: #ddd;
            margin: 4px;
            cursor: pointer;
            transition: 250ms;
            width: fit-content;
            font-family: Inter;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.75;
        }

        #header {
            display: flex;
            color: #fff;
            cursor: pointer;
            transition: 250ms;
        }

        #header:hover {
            opacity: 0.75;
        }

        .opacity-hover {
            opacity: 1;
            transition: 250ms;
        }

        .opacity-hover:hover {
            opacity: 0.75;
        }

        .section-title {
            margin-top: 48px;
            transition: 250ms;
        }

        .section-title:hover {
            opacity: 0.75;
        }

        a {
            color: #ccc;
        }

        .ripper-button {
            background: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            gap: 8px;
            font-size: 18px;
        }

        .ripper-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 200px;
            width: 20vw;
            margin: 8px 0;
            background: rgba(204, 204, 204, 0.1);
            border-radius: 8px;
        }

        .ripper-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            max-height: 0;
            overflow: hidden;
            margin-top: 0;
        }

        .ripper-content.expanded {
            max-height: 600px;
            margin-top: 8px;
            margin-bottom: 18px;
        }

        .chevron {
            margin-left: auto;
            display: inline-block;
        }

        .chevron.rotated {
            transform: rotate(180deg);
        }
    </style>
</head>

            window.open('https://www.audiomack-downloader.com/', '_blank');
        }

        function openSpotiSongDL() {
            window.open('https://spotisongdownloader.com/', '_blank');
        }

        function toggleSection(button) {
            const section = button.parentElement;
            const content = section.querySelector('.ripper-content');
            const chevron = button.querySelector('.chevron');

            content.classList.toggle('expanded');
            chevron.classList.toggle('rotated');
        }
    </script>
