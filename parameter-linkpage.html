<html>

<head>
    <title>Parameter Linkpage</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: #2f2f2f;
            font-family: Inter;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #ccc;
        }

        #picture {
            border-radius: 50%;
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
            cursor: pointer;
            transition: 250ms;
        }

        #picture:hover {
            transform: scale(1.05);
        }

        #picture:active {
            transform: scale(0.95);
        }

        #name {
            color: #fff;
            transition: 250ms;
            cursor: pointer;
            margin-bottom: 0;
            margin-top: 12px;
        }

        #name:hover {
            opacity: 0.75;
        }

        #username {
            transition: 250ms;
            cursor: pointer;
            margin: 0;
        }

        #username:hover {
            opacity: 0.75;
        }


        #link-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 250px;
            margin-top: 32px;
        }

        .link-button {
            background: #ccc;
            color: #000;
            border: none;
            border-radius: 8px;
            transition: 250ms;
            cursor: pointer;
            padding: 16px;
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
            font-size: 16px;
        }

        .link-button:hover {
            transform: scale(1.1);
        }

        .link-button:active {
            transform: scale(0.9);
        }
    </style>
</head>

<body>
    <img id="picture" src="https://dummyimage.com/500x500/000/fff.jpg&text=Test+Image" width="200px" height="200px" alt="Picture"/>
    <h1 id="name">Name</h1>
    <p id="username">@username</p>

    <div id="link-container">
        <button class="link-button">Website 1</button>
        <button class="link-button">Website 2</button>
        <button class="link-button">Website 3</button>
        <button class="link-button">Website 4</button>
        <button class="link-button" style="background: #cc0000; color: #fff;">more soon</button>

    </div>
</body>

</html>
