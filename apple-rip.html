<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 361 361'%3E%3ClinearGradient id='a' x1='180' x2='180' y1='358.6' y2='7.8' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%23fa233b'/%3E%3Cstop offset='1' stop-color='%23fb5c74'/%3E%3C/linearGradient%3E%3Cpath fill='url(%23a)' fill-rule='evenodd' d='M360 113V89l-2-24a76 76 0 0 0-63-63l-24-2H89L65 2A76 76 0 0 0 2 65L0 89v158a2774 2774 0 0 0 0 24l2 24a76 76 0 0 0 63 63l24 2h182l24-2a76 76 0 0 0 63-63l2-24V113z' clip-rule='evenodd'/%3E%3Cpath fill='%23fff' fill-rule='evenodd' d='m255 55-10 2-107 21a15 15 0 0 0-7 3c-2 2-3 4-3 7l-1 4v134c0 3 0 6-2 9l-8 4-7 1a122 122 0 0 0-19 5 28 28 0 0 0-20 30 28 28 0 0 0 22 24c6 1 11 1 20-1l12-4a31 31 0 0 0 15-22 62 62 0 0 0 1-13V143c0-6 2-8 7-9l93-19c6-1 9 1 9 7v79c0 3 0 6-2 9l-8 4-7 1a122 122 0 0 0-20 5 28 28 0 0 0-19 30 28 28 0 0 0 22 25c5 1 11 0 19-1l12-5a31 31 0 0 0 16-21l1-14V65c0-7-4-10-9-10z' clip-rule='evenodd'/%3E%3C/svg%3E">
    <title>AppleRip</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            user-select: none;
        }

        body {
            background: #2b2b2b;
            min-height: 100vh;
            padding: 2rem;
            color: #fff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #ff4e6b;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #ff4e6b;
        }

        select option {
            background: #203a43;
            color: #fff;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            background: linear-gradient(-175deg, #ff4e6b 0%, #ff0436 100%);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 78, 107, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .alert {
            padding: 1rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .status-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-info {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.8;
        }

        .status-info span {
            font-weight: 600;
            color: #fff;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff0436 0%, #ff4e6b 100%);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .progress-text {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            transition: all 0.3s;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .file-details h3 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
            max-width: 50vw;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        @media (max-width: 600px) {
            .file-details h3 {
                max-width: 30vw;
            }
        }

        @media (max-width: 400px) {
            .file-details h3 {
                max-width: 20vw;
            }
        }

        .file-details p {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .file-size {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .info-box {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.875rem;
        }

        .info-box code {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-family: 'Courier New', monospace;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="50px" height="50px" viewBox="0 0 361 361">
                    <linearGradient id="a" x1="180" x2="180" y1="358.6" y2="7.8" gradientUnits="userSpaceOnUse">
                        <stop offset="0" stop-color="#fa233b" />
                        <stop offset="1" stop-color="#fb5c74" />
                    </linearGradient>
                    <path fill="url(#a)" fill-rule="evenodd"
                        d="M360 113V89l-2-24a76 76 0 0 0-63-63l-24-2H89L65 2A76 76 0 0 0 2 65L0 89v158a2774 2774 0 0 0 0 24l2 24a76 76 0 0 0 63 63l24 2h182l24-2a76 76 0 0 0 63-63l2-24V113z"
                        clip-rule="evenodd" />
                    <path fill="#fff" fill-rule="evenodd"
                        d="m255 55-10 2-107 21a15 15 0 0 0-7 3c-2 2-3 4-3 7l-1 4v134c0 3 0 6-2 9l-8 4-7 1a122 122 0 0 0-19 5 28 28 0 0 0-20 30 28 28 0 0 0 22 24c6 1 11 1 20-1l12-4a31 31 0 0 0 15-22 62 62 0 0 0 1-13V143c0-6 2-8 7-9l93-19c6-1 9 1 9 7v79c0 3 0 6-2 9l-8 4-7 1a122 122 0 0 0-20 5 28 28 0 0 0-19 30 28 28 0 0 0 22 25c5 1 11 0 19-1l12-5a31 31 0 0 0 16-21l1-14V65c0-7-4-10-9-10z"
                        clip-rule="evenodd" />
                </svg>
            </div>
            <h1>AppleRip</h1>
            <p class="subtitle">The easiest way to download lossless files from Apple Music</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label for="url">Apple Music URL</label>
                <input type="text" autocomplete="off" id="url" placeholder="https://music.apple.com/...">
            </div>

            <div class="form-group">
                <label for="quality">Quality</label>
                <select id="quality">
                    <option value="AAC_256Kbps">AAC 256 Kbps</option>
                    <option value="ALAC_16Bit_44kHz">ALAC 16-Bit 44kHz</option>
                    <option value="ALAC_24Bit_48kHz">ALAC 24-Bit 48kHz</option>
                    <option value="ALAC_24Bit_96kHz">ALAC 24-Bit 96kHz</option>
                    <option value="ALAC_24Bit_192kHz">ALAC 24-Bit 192kHz</option>
                    <option value="DOLBY_ATMOS">Dolby Atmos</option>
                    <option value="DOLBY_ATMOS_MAX">Dolby Atmos Max</option>
                </select>
            </div>

            <button class="btn" id="downloadBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 15V3" />
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <path d="m7 10 5 5 5-5" />
                </svg>
                <span>Start Download</span>
            </button>

            <div id="errorAlert" class="alert alert-error hidden">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3" />
                    <path d="M12 9v4" />
                    <path d="M12 17h.01" />
                </svg>
                <span id="errorMessage"></span>
            </div>
        </div>

        <div id="statusCard" class="card hidden">
            <div class="status-header">
                <h2>Current Download</h2>
                <div class="status-icon" id="statusIcon"></div>
            </div>
            <div class="status-info" id="statusInfo"></div>
            <div id="progressContainer" class="hidden">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            <div id="successAlert" class="alert alert-success hidden">
                ✓ Download completed! The file is being downloaded...
            </div>
        </div>

        <div id="filesCard" class="card hidden">
            <h2 style="margin-bottom: 1rem;">Recent Downloads</h2>
            <div class="file-list" id="fileList"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://a.paxsenix.org';

        const urlInput = document.getElementById('url');
        const qualitySelect = document.getElementById('quality');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');
        const statusCard = document.getElementById('statusCard');
        const statusIcon = document.getElementById('statusIcon');
        const statusInfo = document.getElementById('statusInfo');
        const successAlert = document.getElementById('successAlert');
        const filesCard = document.getElementById('filesCard');
        const fileList = document.getElementById('fileList');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        let currentJobId = null;
        let pollingInterval = null;

        function getStatusIcon(status) {
            switch (status) {
                case 'running':
                    return '<div class="spinner"></div>';
                case 'completed':
                    return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
                case 'failed':
                    return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>';
                default:
                    return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg>';
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorAlert.classList.remove('hidden');
        }

        function hideError() {
            errorAlert.classList.add('hidden');
        }

        async function checkJobStatus(jobId) {
            try {
                const response = await fetch(API_BASE + '/queue/' + jobId);
                const data = await response.json();

                updateStatusDisplay(data);

                if (data.status === 'completed') {
                    successAlert.classList.remove('hidden');
                    if (data.downloadUrl) {
                        let downloadPath = data.downloadUrl;
                        if (downloadPath.startsWith('http://') || downloadPath.startsWith('https://')) {
                            window.location.href = downloadPath;
                        } else {
                            if (!downloadPath.startsWith('/')) {
                                downloadPath = '/' + downloadPath;
                            }
                            window.location.href = API_BASE + downloadPath;
                        }
                    }
                    loadDownloadedFiles();
                    setTimeout(function () {
                        statusCard.classList.add('hidden');
                        currentJobId = null;
                        downloadBtn.disabled = false;
                        downloadBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/></svg><span>Start Download</span>';
                    }, 3000);
                    if (pollingInterval) {
                        clearInterval(pollingInterval);
                    }
                } else if (data.status === 'failed') {
                    showError('Download failed');
                    statusCard.classList.add('hidden');
                    currentJobId = null;
                    downloadBtn.disabled = false;
                    downloadBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/></svg><span>Start Download</span>';
                    if (pollingInterval) {
                        clearInterval(pollingInterval);
                    }
                }
            } catch (err) {
                console.error('Status check error:', err);
            }
        }

        function updateStatusDisplay(job) {
            statusIcon.innerHTML = getStatusIcon(job.status);

            let info = '<p><span>Status:</span> ' + job.status + '</p>';
            info += '<p><span>Quality:</span> ' + job.quality + '</p>';
            if (job.filename) {
                info += '<p><span>File:</span> ' + job.filename + '</p>';
            }
            if (job.size) {
                info += '<p><span>Size:</span> ' + job.size + '</p>';
            }

            statusInfo.innerHTML = info;

            if (job.progress && job.status === 'running') {
                progressContainer.classList.remove('hidden');
                const percent = job.progress.percent || 0;
                progressBar.style.width = percent + '%';

                let progressDetails = percent + '%';
                if (job.progress.stage) {
                    progressDetails = job.progress.stage + ': ' + progressDetails;
                }
                if (job.progress.downloaded && job.progress.totalSize) {
                    progressDetails += ' (' + job.progress.downloaded + ' / ' + job.progress.totalSize + ')';
                }
                if (job.progress.speed) {
                    progressDetails += ' - ' + job.progress.speed;
                }

                progressText.textContent = progressDetails;
            } else {
                progressContainer.classList.add('hidden');
            }
        }

        async function handleDownload() {
            const url = urlInput.value.trim();
            const quality = qualitySelect.value;

            if (!url) {
                showError('Please enter a URL');
                return;
            }

            hideError();
            successAlert.classList.add('hidden');
            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<div class="spinner"></div><span>Processing...</span>';

            try {
                const response = await fetch(
                    API_BASE + '/download?url=' + encodeURIComponent(url) + '&quality=' + quality
                );
                const data = await response.json();

                if (response.ok && data.job) {
                    currentJobId = data.job.id;
                    statusCard.classList.remove('hidden');
                    updateStatusDisplay(data.job);

                    pollingInterval = setInterval(function () {
                        checkJobStatus(currentJobId);
                    }, 500);

                    checkJobStatus(currentJobId);
                } else {
                    showError(data.error || 'Download could not be started');
                    downloadBtn.disabled = false;
                    downloadBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/></svg><span>Start Download</span>';
                }
            } catch (err) {
                showError('Connection error: ' + err.message);
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/></svg><span>Start Download</span>';
            }
        }

        function cleanFilename(filename) {
            let cleaned = filename.replace(/\[.*?\]/g, '').trim();
            cleaned = cleaned.replace(/^\d+\.\s*/, '');
            cleaned = cleaned.replace(/\.[^.]+$/, '');
            cleaned = cleaned.trim();
            return cleaned;
        }

        async function loadDownloadedFiles() {
            try {
                const response = await fetch(API_BASE + '/list');
                const data = (await response.json())
                    .filter(file => file.filename !== 'cover.jpg')
                    .sort((a, b) => parseInt(a.age) - parseInt(b.age));

                if (data.length > 0) {
                    filesCard.classList.remove('hidden');
                    fileList.innerHTML = data.map(function (file) {
                        return '<div class="file-item">' +
                            '<div class="file-info">' +
                            '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="2"/></svg>' +
                            '<div class="file-details">' +
                            '<h3>' + cleanFilename(file.filename) + '</h3>' +
                            '<p>' + file.age + '</p>' +
                            '</div>' +
                            '</div>' +
                            '<span class="file-size">' + file.size + '</span>' +
                            '</div>';
                    }).join('');
                }
            } catch (err) {
                console.error('Error loading files:', err);
            }
        }

        downloadBtn.addEventListener('click', handleDownload);
        urlInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleDownload();
            }
        });

        loadDownloadedFiles();
    </script>
</body>
