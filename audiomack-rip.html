<html lang="en">

<head>

    <title>AudiomackRip</title>
    <script>
        (function () {
            var c = document.cookie.split(';').find(function (x) { return x.trim().startsWith('theme='); });
            var v = c ? decodeURIComponent(c.split('=')[1].trim()) : 'dark';
            var resolved = v === 'system' ? (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light') : v;
            document.documentElement.setAttribute('data-theme', resolved);
            document.documentElement.setAttribute('data-theme-pref', v);
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --accent: #ffa200;
            --accent-light: #ffcc66;
            --bg: #1a1a1a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-elevated: #111;
            --bg-input: rgba(255, 255, 255, 0.05);
            --bg-item: rgba(255, 255, 255, 0.03);
            --bg-item-hover: rgba(255, 255, 255, 0.07);
            --bg-btn-hover: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.1);
            --border-bright: rgba(255, 255, 255, 0.2);
            --text-dim: rgba(255, 255, 255, 0.4);
            --text-mid: rgba(255, 255, 255, 0.7);
            --text-main: #ffffff;
            --spinner-ring: rgba(255, 255, 255, 0.15);
            --spinner-top: #ffffff;
            --tooltip-bg: #0d0d0d;
        }

        [data-theme="light"] {
            --bg: #ededed;
            --bg-card: rgba(0, 0, 0, 0.04);
            --bg-elevated: #fafafa;
            --bg-input: rgba(0, 0, 0, 0.04);
            --bg-item: rgba(0, 0, 0, 0.03);
            --bg-item-hover: rgba(0, 0, 0, 0.07);
            --bg-btn-hover: rgba(0, 0, 0, 0.05);
            --border: rgba(0, 0, 0, 0.1);
            --border-bright: rgba(0, 0, 0, 0.22);
            --text-dim: rgba(0, 0, 0, 0.38);
            --text-mid: rgba(0, 0, 0, 0.6);
            --text-main: #111111;
            --spinner-ring: rgba(0, 0, 0, 0.12);
            --spinner-top: #333333;
            --tooltip-bg: #f0f0f0;
        }

        html {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
        }

        body {
            font-family: monospace;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            transition: background 0.2s, color 0.2s;
        }

        .section {
            min-height: 100dvh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem;
        }

        .section-files {
            align-items: flex-start;
            padding-top: 3.5rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-title {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.4rem;
        }

        .header-title h1 {
            font-size: 2.2rem;
            color: var(--accent);
            line-height: 1;
        }

        .header-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 12px;
            letter-spacing: 0.02em;
        }

        .settings-trigger {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-family: monospace;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.2rem 0.5rem;
            transition: color 0.2s;
        }

        .settings-trigger:hover {
            color: var(--text-mid);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 1.75rem;
            margin-bottom: 0.75rem;
        }

        .input-row {
            display: flex;
            border: 1px solid var(--border);
            background: var(--bg-input);
            transition: border-color 0.2s;
            margin-bottom: 1rem;
        }

        .input-row:focus-within {
            border-color: var(--border-bright);
        }

        .input-row.invalid {
            border-color: rgba(255, 162, 0, 0.5);
        }

        input[type="text"] {
            flex: 1;
            padding: 0.85rem 1rem;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 0.9rem;
            font-family: monospace;
            outline: none;
            min-width: 0;
        }

        input[type="text"]::placeholder {
            color: var(--text-dim);
        }

        .paste-btn {
            padding: 0 1rem;
            background: transparent;
            border: none;
            border-left: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            font-family: monospace;
            font-size: 0.75rem;
            letter-spacing: 0.06em;
            transition: color 0.15s, background 0.15s;
            white-space: nowrap;
        }

        .paste-btn:hover {
            color: var(--text-main);
            background: var(--bg-btn-hover);
        }

        .btn {
            width: 100%;
            padding: 0.875rem 1rem;
            background: none;
            border: 1px solid var(--accent);
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: monospace;
            letter-spacing: 0.05em;
        }

        .btn:hover:not(:disabled) {
            background: var(--accent);
            color: #fff;
        }

        .btn:disabled {
            background: rgba(255, 162, 0, 0.3);
            border-color: rgba(255, 162, 0, 0.35);
            cursor: not-allowed;
        }

        .scroll-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--text-dim);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .scroll-hint:hover {
            color: var(--text-mid);
        }

        .scroll-hint.hidden {
            visibility: hidden;
        }

        .files-header {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .files-count {
            font-size: 0.68rem;
            color: var(--text-dim);
            background: var(--bg-item);
            border: 1px solid var(--border);
            padding: 0.15rem 0.5rem;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.9rem 1rem;
            background: var(--bg-item);
            border: 1px solid var(--border);
            transition: background 0.15s, border-color 0.15s;
            gap: 1rem;
        }

        .file-item-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 0;
        }

        .file-format-badge {
            font-size: 0.62rem;
            letter-spacing: 0.07em;
            padding: 0.15rem 0.4rem;
            border: 1px solid var(--border);
            color: var(--text-dim);
            white-space: nowrap;
            flex-shrink: 0;
            background: var(--bg-input);
        }

        .file-format-badge.m4a {
            border-color: rgba(255, 162, 0, 0.35);
            color: #ffa200;
        }

        .file-details {
            min-width: 0;
        }

        .file-details h3 {
            font-size: 0.88rem;
            margin-bottom: 0.2rem;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            max-width: 42vw;
        }

        @media (max-width: 480px) {
            .file-details h3 {
                max-width: 34vw;
            }
        }

        .file-details p {
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .file-item-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.25rem;
            flex-shrink: 0;
        }

        .file-size {
            font-size: 0.78rem;
            color: var(--text-mid);
            white-space: nowrap;
        }

        .file-bitrate {
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 0.06em;
        }

        #statusPanel {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 280px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-bright);
            z-index: 100;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            transform: translateY(calc(100% + 2rem));
            opacity: 0;
            transition: transform 0.35s cubic-bezier(0.34, 1.3, 0.64, 1), opacity 0.25s ease;
            overflow: hidden;
        }

        #statusPanel.visible {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 520px) {
            #statusPanel {
                right: 0;
                left: 0;
                bottom: 0;
                width: 100%;
                border-left: none;
                border-right: none;
                border-bottom: none;
            }
        }

        .panel-accent {
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
        }

        .panel-body {
            padding: 1rem 1.1rem 1.1rem;
        }

        .panel-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.85rem;
        }

        .panel-label {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .panel-status-pill {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.7rem;
            color: var(--text-mid);
        }

        .panel-status-pill .spinner {
            width: 10px;
            height: 10px;
            border-width: 1.5px;
        }

        .panel-filename {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
        }

        .panel-artist {
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-bottom: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .panel-progress-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.4rem;
        }

        .panel-percent {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
        }

        .panel-speed {
            font-size: 0.72rem;
            color: var(--text-mid);
            text-align: right;
        }

        .progress-bar-container {
            width: 100%;
            height: 3px;
            background: rgba(128, 128, 128, 0.15);
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            transition: width 0.35s ease;
        }

        .panel-size-row {
            display: flex;
            justify-content: space-between;
            margin-top: 0.4rem;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .panel-success-row {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
            font-size: 0.78rem;
            color: #4ade80;
            display: none;
        }

        .panel-success-row.visible {
            display: block;
        }

        #progressBlock {
            display: none;
        }

        #progressBlock.visible {
            display: block;
        }

        #errorToast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(calc(100% + 2rem));
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.35);
            color: #fca5a5;
            padding: 0.65rem 1rem;
            font-size: 0.8rem;
            z-index: 200;
            white-space: nowrap;
            transition: transform 0.25s ease, opacity 0.25s ease;
            opacity: 0;
        }

        #errorToast.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .spinner {
            border: 2px solid var(--spinner-ring);
            border-top: 2px solid var(--spinner-top);
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 0.75s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .modal-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--bg-elevated);
            border: 1px solid var(--border-bright);
            width: 100%;
            max-width: 380px;
            transform: translateY(12px);
            transition: transform 0.25s cubic-bezier(0.34, 1.3, 0.64, 1);
        }

        .modal-overlay.visible .modal {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-mid);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            padding: 0.1rem 0.3rem;
            transition: color 0.15s;
        }

        .modal-close:hover {
            color: var(--text-main);
        }

        .modal-body {
            padding: 1.25rem;
        }

        .modal-section-label {
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 0.6rem;
        }

        .theme-btns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.4rem;
            margin-bottom: 1.5rem;
        }

        .theme-btn {
            padding: 0.6rem 0.4rem;
            background: var(--bg-item);
            border: 1px solid var(--border);
            color: var(--text-mid);
            font-size: 0.78rem;
            font-family: monospace;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .theme-btn:hover {
            background: var(--bg-item-hover);
            color: var(--text-main);
        }

        .theme-btn.active {
            background: rgba(255, 162, 0, 0.15);
            border-color: var(--accent);
            color: var(--text-main);
        }

        .modal-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin-bottom: 1.25rem;
        }

        .credits {
            font-size: 0.75rem;
            color: var(--text-dim);
            line-height: 1.8;
        }

        .credits a {
            color: var(--text-mid);
            text-decoration: none;
            transition: color 0.15s;
        }

        .credits a:hover {
            color: var(--text-main);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <section class="section">
        <div class="container">
            <div class="header">
                <div class="header-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28px" height="28px" viewBox="0 0 279 192">
                        <path fill="#ffa200"
                            d="M3.8 88.8s6.3-1 9 1.7c2.5 2.7.8 8.3-2.6 8.4s-6.6.7-8.9-1.7-1.7-7.2 2.5-8.4m68.4 38.3c-.6 0-1.2-.2-1.9-.7-4.5-6.3-6.1-27.8-8.2-29-2.2-1.4-10 11.9-25.4 10.4-6.5-.6-13-4.8-17-7.7.4-4.9.5-16.3 10.1-12.6 5.9 2.3 15.9 8.5 24.7-2.6 9.7-12.3 15.1-8.8 18.3-6 3.3 2.6 1.1 16.5 6 12.6s24.1-28 24.1-28 15-15.2 17.3.8c2.3 15.9 12.1 33.5 14.7 33s32.8-61.9 37.2-65.8c4.3-4 18.8-3.5 18.2 6.7-.7 10.1-2.2 73.3-2.2 73.3s-1.7 17.8 1 8.3c1.2-4 2.5-7.5 4-11.7a11535 11535 0 0 0 30.2-98.3 42 42 0 0 1 1.1-3.8l1-3.3c.3-.8 1-1.4 2.2-1.8 1.1-.7 2.3-.8 3.7-.8 3.5-.3 8 .1 12 1.3 1.2 0 2.5.4 3.7 1.3l.2.1h.1c.3.2.7.6 1.1 1.2l.7.9c2.3 3.3 3.7 9.4 2.3 20.3-3.5 27.2-6.2 83-6.2 83s-.6 2.7 5-9l.7-1.2c.3-.2.7-.5 1-1 3.5-4.1 12.8-6.5 19.3-6.5 2.7.3 5 1 6.3 1.9 2.6 3.8 1 18.1 1 18.1-5.3.5-15.5 3.4-19.1 4-3.7.5-9.2 24-16.8 21.6s-24.7-13-24.7-14.6l1.7-21v-.8c.3-3.1 0-4.5-1.4-1.4-1.3 2.8-6.7 20.2-12.9 39.2l-13.7 41c-1.8 5-3.3 8.7-4.4 10.7-1.6 2.2-3.8 3.5-6.8 2.6-7.5-2.3-17-12.6-17-15.2-.3-14.6.6-92.7-3-86.2-3.5 6.7-31.6 53-31.6 53l-1.3.1c-2-.2-5-.8-6-2.7v-.4l-.2-.4-.9-3.8a476 476 0 0 0-5.4-16.6 653 653 0 0 0-7-22.6c-1-2.3-2.6-1.3-4 0-6.3 5.3-19.6 28.8-31.7 30.1" />
                    </svg>
                    <h1>AudiomackRip</h1>
                </div>
                <div class="header-actions">
                    <span class="subtitle">The easiest and fastest way to download songs from Audiomack</span>
                    <button class="settings-trigger" id="settingsBtn">⚙ Settings</button>
                </div>
            </div>

            <div class="card">
                <div class="input-row" id="inputRow">
                    <input type="text" autocomplete="off" id="url"
                        placeholder="https://audiomack.com/artist/song/song-name">
                    <button class="paste-btn" id="pasteBtn">PASTE</button>
                </div>
                <button class="btn" id="downloadBtn"><span>Download</span></button>
            </div>

            <div class="scroll-hint hidden" id="scrollHint">↓ Recent Downloads</div>
        </div>
    </section>

    <section class="section section-files" id="filesSection" style="display:none;">
        <div class="container">
            <div class="files-header">
                <span>Recent Downloads</span>
                <span class="files-count" id="filesCount"></span>
            </div>
            <div class="file-list" id="fileList"></div>
        </div>
    </section>

    <div id="statusPanel">
        <div class="panel-accent"></div>
        <div class="panel-body">
            <div class="panel-top-row">
                <span class="panel-label" id="panelLabel">Download</span>
                <div class="panel-status-pill" id="panelStatusPill"></div>
            </div>
            <div class="panel-filename" id="panelFilename">Preparing…</div>
            <div class="panel-artist" id="panelArtist"></div>
            <div id="progressBlock">
                <div class="panel-progress-row">
                    <div class="panel-percent" id="panelPercent">0%</div>
                    <div class="panel-speed" id="panelSpeed"></div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="panel-size-row">
                    <span id="panelDownloaded"></span>
                    <span id="panelTotalSize"></span>
                </div>
            </div>
            <div class="panel-success-row" id="panelSuccess">✓ File saved to your device</div>
        </div>
    </div>

    <div id="errorToast"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Settings</span>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-section-label">Theme</div>
                <div class="theme-btns">
                    <button class="theme-btn" data-value="system">System</button>
                    <button class="theme-btn" data-value="dark">Dark</button>
                    <button class="theme-btn" data-value="light">Light</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://jellyfish-app-u6327.ondigitalocean.app/api/audiomack';
        const WORKER_URL = 'https://audiomackrip-log.monkeytools.workers.dev';

        const urlInput      = document.getElementById('url');
        const inputRow      = document.getElementById('inputRow');
        const pasteBtn      = document.getElementById('pasteBtn');
        const downloadBtn   = document.getElementById('downloadBtn');
        const statusPanel   = document.getElementById('statusPanel');
        const panelLabel    = document.getElementById('panelLabel');
        const panelStatusPill = document.getElementById('panelStatusPill');
        const panelFilename = document.getElementById('panelFilename');
        const panelArtist   = document.getElementById('panelArtist');
        const panelPercent  = document.getElementById('panelPercent');
        const panelSpeed    = document.getElementById('panelSpeed');
        const panelDownloaded = document.getElementById('panelDownloaded');
        const panelTotalSize  = document.getElementById('panelTotalSize');
        const panelSuccess  = document.getElementById('panelSuccess');
        const progressBlock = document.getElementById('progressBlock');
        const progressBar   = document.getElementById('progressBar');
        const filesSection  = document.getElementById('filesSection');
        const fileList      = document.getElementById('fileList');
        const filesCount    = document.getElementById('filesCount');
        const scrollHint    = document.getElementById('scrollHint');
        const errorToast    = document.getElementById('errorToast');
        const settingsBtn   = document.getElementById('settingsBtn');
        const modalOverlay  = document.getElementById('modalOverlay');
        const modalClose    = document.getElementById('modalClose');

        let errorTimeout = null;

        function setCookie(name, value, days) {
            const exp = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + exp + '; path=/';
        }

        function applyTheme(pref) {
            setCookie('theme', pref, 365);
            document.documentElement.setAttribute('data-theme-pref', pref);
            const resolved = pref === 'system'
                ? (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light')
                : pref;
            document.documentElement.setAttribute('data-theme', resolved);
            document.querySelectorAll('.theme-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.value === pref);
            });
        }

        const savedThemePref = document.documentElement.getAttribute('data-theme-pref') || 'dark';
        document.querySelectorAll('.theme-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.value === savedThemePref);
        });

        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => applyTheme(btn.dataset.value));
        });

        matchMedia('(prefers-color-scheme:dark)').addEventListener('change', () => {
            if (document.documentElement.getAttribute('data-theme-pref') === 'system') applyTheme('system');
        });

        settingsBtn.addEventListener('click', () => modalOverlay.classList.add('visible'));
        modalClose.addEventListener('click', () => modalOverlay.classList.remove('visible'));
        modalOverlay.addEventListener('click', e => {
            if (e.target === modalOverlay) modalOverlay.classList.remove('visible');
        });

        scrollHint.addEventListener('click', () => filesSection.scrollIntoView({ behavior: 'smooth' }));

        function showError(msg) {
            errorToast.textContent = msg;
            errorToast.classList.add('visible');
            clearTimeout(errorTimeout);
            errorTimeout = setTimeout(() => errorToast.classList.remove('visible'), 4000);
        }

        pasteBtn.addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                urlInput.value = text;
                validateInput();
                urlInput.focus();
            } catch { urlInput.focus(); }
        });

        function validateInput() {
            const val = urlInput.value.trim();
            inputRow.classList.toggle('invalid', val.length > 0 && !val.includes('audiomack.com'));
        }
        urlInput.addEventListener('input', validateInput);

        function parseAudiomackUrl(url) {
            const match = url.match(/audiomack\.com\/([^\/]+)\/song\/([^\/\?#]+)/);
            if (!match) return null;
            return { artist: match[1], song: match[2] };
        }

        function fmtBytes(b) {
            if (b < 1024) return b.toFixed(0) + ' B';
            if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
            return (b / 1048576).toFixed(1) + ' MB';
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function timeAgo(ts) {
            const diff = Date.now() - ts;
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return mins + ' min ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + ' hr ago';
            return Math.floor(hrs / 24) + ' days ago';
        }

        async function logToWorker(entry) {
            try {
                await fetch(WORKER_URL + '/log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(entry)
                });
            } catch (e) {
                console.warn('Worker log failed:', e);
            }
        }

        async function loadDownloadedFiles() {
            try {
                const res = await fetch(WORKER_URL + '/list');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();

                if (Array.isArray(data) && data.length > 0) {
                    filesSection.style.display = 'flex';
                    scrollHint.classList.remove('hidden');
                    filesCount.textContent = data.length + ' track' + (data.length !== 1 ? 's' : '');

                    fileList.innerHTML = data.map(f => {
                        const age = timeAgo(f.timestamp);
                        const artist = f.artist ? escapeHtml(f.artist) + ' · ' : '';
                        return '<div class="file-item">'
                            + '<div class="file-item-left">'
                            + '<span class="file-format-badge m4a">M4A</span>'
                            + '<div class="file-details">'
                            + '<h3>' + escapeHtml(f.title) + '</h3>'
                            + '<p>' + artist + age + '</p>'
                            + '</div>'
                            + '</div>'
                            + '<div class="file-item-right">'
                            + '<span class="file-size">' + escapeHtml(f.size) + '</span>'
                            + '<span class="file-bitrate">' + escapeHtml(f.bitrate || 'AAC') + '</span>'
                            + '</div>'
                            + '</div>';
                    }).join('');
                } else {
                    filesSection.style.display = 'none';
                    scrollHint.classList.add('hidden');
                }
            } catch (err) {
                filesSection.style.display = 'none';
                scrollHint.classList.add('hidden');
            }
        }

        async function downloadFile(url, filename, songData) {
            panelLabel.textContent = 'Download';
            panelStatusPill.innerHTML = '<div class="spinner"></div> downloading';
            progressBlock.classList.add('visible');
            panelPercent.textContent = '0%';
            panelSpeed.textContent = '';
            panelDownloaded.textContent = '';
            panelTotalSize.textContent = '';
            progressBar.style.width = '0%';
            panelSuccess.classList.remove('visible');

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('HTTP ' + res.status);

                const total = parseInt(res.headers.get('content-length') || '0');
                const reader = res.body.getReader();
                const chunks = [];
                let received = 0;
                let lastCheck = Date.now();
                let lastBytes = 0;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    received += value.length;

                    const now = Date.now();
                    if (now - lastCheck >= 500) {
                        const bps = (received - lastBytes) / ((now - lastCheck) / 1000);
                        panelSpeed.textContent = fmtBytes(bps) + '/s';
                        lastCheck = now;
                        lastBytes = received;
                    }

                    panelDownloaded.textContent = fmtBytes(received);
                    if (total) {
                        const pct = Math.round(received / total * 100);
                        progressBar.style.width = pct + '%';
                        panelPercent.textContent = pct + '%';
                        panelTotalSize.textContent = '/ ' + fmtBytes(total);
                    }
                }

                const blob = new Blob(chunks, { type: 'audio/mp4' });
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);

                progressBar.style.width = '100%';
                panelPercent.textContent = '100%';
                panelSpeed.textContent = '';
                panelStatusPill.innerHTML = '<span style="color:#4ade80;">✓ done</span>';
                panelSuccess.classList.add('visible');

                const sizeStr = total ? fmtBytes(total) : fmtBytes(received);
                await logToWorker({
                    title:     songData?.title    || filename.replace(/\.m4a$/, ''),
                    artist:    songData?.artist   || '',
                    filename:  filename,
                    size:      sizeStr,
                    bytes:     total || received,
                    bitrate:   songData?.bitrate  || 'AAC',
                    timestamp: Date.now()
                });

                loadDownloadedFiles();

                setTimeout(() => {
                    statusPanel.classList.remove('visible');
                    setTimeout(() => progressBlock.classList.remove('visible'), 350);
                    panelLabel.textContent = 'Download';
                    downloadBtn.disabled = false;
                    downloadBtn.innerHTML = '<span>Download</span>';
                    panelSuccess.classList.remove('visible');
                }, 3500);

            } catch (err) {
                window.location.href = url;
                setTimeout(() => statusPanel.classList.remove('visible'), 1500);
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<span>Download</span>';
            }
        }

        async function handleDownload() {
            const url = urlInput.value.trim();
            if (!url) { showError('Please enter a URL'); return; }

            const parsed = parseAudiomackUrl(url);
            if (!parsed) { showError('Please enter a valid Audiomack URL'); return; }

            urlInput.value = '';
            inputRow.classList.remove('invalid');
            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<div class="spinner"></div><span>Processing</span>';

            panelLabel.textContent = 'Download';
            panelStatusPill.innerHTML = '<div class="spinner"></div> fetching';
            panelFilename.textContent = 'Fetching metadata…';
            panelArtist.textContent = '';
            progressBlock.classList.remove('visible');
            panelSuccess.classList.remove('visible');
            statusPanel.classList.add('visible');

            try {
                const metaRes = await fetch(API_BASE + '/get-song-by-name/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ artist: parsed.artist, song: parsed.song })
                });
                if (!metaRes.ok) throw new Error('Failed to fetch song metadata');
                const metaData = await metaRes.json();
                const songData = metaData.results;
                if (!songData?.id) throw new Error('Invalid song data received');

                panelFilename.textContent = songData.title || 'Unknown Title';
                panelArtist.textContent = songData.artist || '';
                panelStatusPill.innerHTML = '<div class="spinner"></div> fetching url';

                const urlRes = await fetch(API_BASE + '/get-song-url-by-id/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ songId: songData.id.toString() })
                });
                if (!urlRes.ok) throw new Error('Failed to fetch download URL');
                const urlData = await urlRes.json();
                if (!urlData.signedUrl) throw new Error('No download URL received');

                const safeTitle  = (songData.title  || 'Unknown').replace(/[\/\\:*?"<>|]/g, '_');
                const safeArtist = (songData.artist || '').replace(/[\/\\:*?"<>|]/g, '_');
                const filename   = safeArtist ? safeArtist + ' - ' + safeTitle + '.m4a' : safeTitle + '.m4a';

                await downloadFile(urlData.signedUrl, filename, songData);

            } catch (err) {
                showError(err.message || 'Download failed');
                statusPanel.classList.remove('visible');
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<span>Download</span>';
            }
        }

        downloadBtn.addEventListener('click', handleDownload);
        urlInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleDownload(); });

        loadDownloadedFiles();
    </script>
</body>

</html>
