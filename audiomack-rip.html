<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AudiomackRip</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: monospace;
            background: #2b2b2b;
            min-height: 100vh;
            min-width: 100vw;
            padding: 2rem;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .container {
            width: 50vw;
            margin: 0;
        }

        .header {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #ffa200;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .card {
            backdrop-filter: blur(10px);
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: monospace;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input[type="text"]:focus {
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 14px 16px;
            background: none;
            border: 2px solid #ffa200;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: monospace;
        }

        .btn:hover {
            background: #ffa200;
        }

        .btn:disabled {
            background: #ffa200;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            width: 19px;
            height: 19px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            position: fixed;
            bottom: 50px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
        }

        #statusCard {
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            margin: 0;
            position: fixed;
            right: 50px;
            bottom: 50px;
            width: 30vw;
            padding: 24px;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .status-info {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.8;
        }

        .status-info span {
            font-weight: 600;
            color: #fff;
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            overflow: hidden;
            margin-top: 1rem;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffa200 0%, #ffcc66 100%);
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .hidden {
            display: none;
        }

        .status-info-title {
            line-height: normal;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 18vw;
        }

        .status-info-artist {
            line-height: normal;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 18vw;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 style="display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 0.5rem;">
                <svg width="32px" height="32px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 279 192">
                    <path fill="#ffa200"
                        d="M3.8 88.8s6.3-1 9 1.7c2.5 2.7.8 8.3-2.6 8.4s-6.6.7-8.9-1.7-1.7-7.2 2.5-8.4m68.4 38.3c-.6 0-1.2-.2-1.9-.7-4.5-6.3-6.1-27.8-8.2-29-2.2-1.4-10 11.9-25.4 10.4-6.5-.6-13-4.8-17-7.7.4-4.9.5-16.3 10.1-12.6 5.9 2.3 15.9 8.5 24.7-2.6 9.7-12.3 15.1-8.8 18.3-6 3.3 2.6 1.1 16.5 6 12.6s24.1-28 24.1-28 15-15.2 17.3.8c2.3 15.9 12.1 33.5 14.7 33s32.8-61.9 37.2-65.8c4.3-4 18.8-3.5 18.2 6.7-.7 10.1-2.2 73.3-2.2 73.3s-1.7 17.8 1 8.3c1.2-4 2.5-7.5 4-11.7a11535 11535 0 0 0 30.2-98.3 42 42 0 0 1 1.1-3.8l1-3.3c.3-.8 1-1.4 2.2-1.8 1.1-.7 2.3-.8 3.7-.8 3.5-.3 8 .1 12 1.3 1.2 0 2.5.4 3.7 1.3l.2.1h.1c.3.2.7.6 1.1 1.2l.7.9c2.3 3.3 3.7 9.4 2.3 20.3-3.5 27.2-6.2 83-6.2 83s-.6 2.7 5-9l.7-1.2c.3-.2.7-.5 1-1 3.5-4.1 12.8-6.5 19.3-6.5 2.7.3 5 1 6.3 1.9 2.6 3.8 1 18.1 1 18.1-5.3.5-15.5 3.4-19.1 4-3.7.5-9.2 24-16.8 21.6s-24.7-13-24.7-14.6l1.7-21v-.8c.3-3.1 0-4.5-1.4-1.4-1.3 2.8-6.7 20.2-12.9 39.2l-13.7 41c-1.8 5-3.3 8.7-4.4 10.7-1.6 2.2-3.8 3.5-6.8 2.6-7.5-2.3-17-12.6-17-15.2-.3-14.6.6-92.7-3-86.2-3.5 6.7-31.6 53-31.6 53l-1.3.1c-2-.2-5-.8-6-2.7v-.4a21 21 0 0 1-.2-.4l-.9-3.8a476 476 0 0 0-5.4-16.6 653 653 0 0 0-7-22.6c-1-2.3-2.6-1.3-4 0-6.3 5.3-19.6 28.8-31.7 30.1">
                    </path>
                </svg>
                AudiomackRip
            </h1>
            <p class="subtitle">The best way to download from Audiomack</p>
        </div>

        <div class="card">
            <div class="form-group">
                <input type="text" autocomplete="off" id="url"
                    placeholder="https://audiomack.com/artist/song/song-name">
            </div>

            <button class="btn" id="downloadBtn">
                <span>Download</span>
            </button>
        </div>

        <div id="statusCard" class="card hidden">
            <div class="status-info" id="statusInfo"></div>
            <div id="progressContainer" class="hidden">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
        </div>
    </div>

    <div id="errorAlert" class="alert alert-error hidden">
        <span id="errorMessage"></span>
    </div>

    <div id="successAlert" class="alert alert-success hidden">
        Download completed!
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script>
        const API_BASE = 'https://jellyfish-app-u6327.ondigitalocean.app/api/audiomack';

        const urlInput = document.getElementById('url');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');
        const statusCard = document.getElementById('statusCard');
        const statusInfo = document.getElementById('statusInfo');
        const successAlert = document.getElementById('successAlert');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        function showError(message) {
            errorMessage.textContent = message;
            errorAlert.classList.remove('hidden');
        }

        function hideError() {
            errorAlert.classList.add('hidden');
        }

        function parseAudiomackUrl(url) {
            const match = url.match(/audiomack\.com\/([^\/]+)\/song\/([^\/\?]+)/);
            if (!match) return null;
            return { artist: match[1], song: match[2] };
        }

        function updateProgress(percent, text) {
            progressContainer.classList.remove('hidden');
            progressBar.style.width = percent + '%';
            progressText.textContent = text || (percent + '%');
        }

        function formatYear(timestamp) {
            if (!timestamp) return null;
            const date = new Date(parseInt(timestamp) * 1000);
            return date.getFullYear().toString();
        }

        async function embedMetadata(audioArrayBuffer, metadata, coverBlob) {
            try {
                const reader = new jsmediatags.Reader(new Blob([audioArrayBuffer]));

                return new Promise((resolve) => {
                    reader.read({
                        onSuccess: async (tag) => {
                            const tags = {
                                type: 'M4A',
                                tags: {
                                    title: metadata.title,
                                    artist: metadata.artist,
                                    album: metadata.album || metadata.title,
                                    year: formatYear(metadata.released)
                                }
                            };

                            if (coverBlob) {
                                const coverArrayBuffer = await coverBlob.arrayBuffer();
                                const coverArray = new Uint8Array(coverArrayBuffer);
                                tags.tags.picture = {
                                    format: coverBlob.type,
                                    data: Array.from(coverArray),
                                    description: 'Cover'
                                };
                            }

                            resolve(audioArrayBuffer);
                        },
                        onError: () => {
                            resolve(audioArrayBuffer);
                        }
                    });
                });
            } catch (error) {
                console.log('Metadata embedding skipped:', error);
                return audioArrayBuffer;
            }
        }

        async function downloadWithMetadata(audioUrl, metadata) {
            try {
                updateProgress(10, 'Downloading audio...');

                const audioResponse = await fetch(audioUrl);
                if (!audioResponse.ok) throw new Error('Failed to download audio');

                const audioArrayBuffer = await audioResponse.arrayBuffer();
                updateProgress(40, 'Downloading cover art...');

                const coverUrl = metadata.image || metadata.image_base;
                let coverBlob = null;

                if (coverUrl) {
                    try {
                        const coverResponse = await fetch(coverUrl);
                        if (coverResponse.ok) {
                            coverBlob = await coverResponse.blob();
                        }
                    } catch (e) {
                        console.log('Could not fetch cover art');
                    }
                }

                updateProgress(80, 'Embedding metadata...');

                const processedAudio = await embedMetadata(audioArrayBuffer, metadata, coverBlob);

                updateProgress(90, 'Finalizing download...');

                const filename = `${metadata.title}.m4a`;
                const blob = new Blob([processedAudio], { type: 'audio/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                updateProgress(100, 'Complete!');
                return true;
            } catch (error) {
                console.error('Download error:', error);
                throw error;
            }
        }

        async function handleDownload() {
            const url = urlInput.value.trim();

            if (!url) {
                showError('Please enter a URL');
                return;
            }

            const parsed = parseAudiomackUrl(url);
            if (!parsed) {
                showError('Invalid URL');
                return;
            }

            hideError();
            successAlert.classList.add('hidden');
            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<div class="spinner"></div><span>Processing</span>';
            statusCard.classList.remove('hidden');
            progressContainer.classList.add('hidden');

            try {
                statusInfo.innerHTML = '<p><span></span> Fetching song metadata...</p>';

                const metadataResponse = await fetch(`${API_BASE}/get-song-by-name/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ artist: parsed.artist, song: parsed.song })
                });

                if (!metadataResponse.ok) throw new Error('Failed to fetch song metadata');

                const metadataData = await metadataResponse.json();
                const songData = metadataData.results;

                if (!songData || !songData.id) throw new Error('Invalid song data received');

                statusInfo.innerHTML = `
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <img src="${songData.image}" width="50px" height="50px"/>
                        <div style="display: flex; flex-direction: column;">
                            <p class="status-info-title">${songData.title}</p>
                            <p class="status-info-artist">${songData.artist}</p>
                        </div>
                    </div>
                `;

                const urlResponse = await fetch(`${API_BASE}/get-song-url-by-id/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ songId: songData.id.toString() })
                });

                if (!urlResponse.ok) throw new Error('Failed to fetch download URL');

                const urlData = await urlResponse.json();

                if (!urlData.signedUrl) throw new Error('No download URL received');

                statusInfo.innerHTML = `
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <img src="${songData.image}" width="50px" height="50px"/>
                        <div style="display: flex; flex-direction: column;">
                            <p class="status-info-title">${songData.title}</p>
                            <p class="status-info-artist">${songData.artist}</p>
                        </div>
                    </div>
                `;

                await downloadWithMetadata(urlData.signedUrl, songData);

                successAlert.classList.remove('hidden');
                statusInfo.innerHTML = `
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <img src="${songData.image}" width="50px" height="50px"/>
                        <div style="display: flex; flex-direction: column;">
                            <p class="status-info-title">${songData.title}</p>
                            <p class="status-info-artist">${songData.artist}</p>
                        </div>
                    </div>
                `;

                setTimeout(() => {
                    statusCard.classList.add('hidden');
                    downloadBtn.disabled = false;
                    downloadBtn.innerHTML = '<span>Download</span>';
                }, 3000);

            } catch (err) {
                console.error('Error:', err);
                showError(err.message || 'Download failed');
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<span>Download</span>';
                setTimeout(() => {
                    statusCard.classList.add('hidden');
                }, 3000);
            }
        }

        downloadBtn.addEventListener('click', handleDownload);
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleDownload();
        });
    </script>
</body>
</html>
